  <rect x="822" y="566" width="308" height="72" rx="14" fill="#111827" stroke="#374151"/>
  <text x="976" y="612" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="600" text-anchor="middle">Browse marketplace</text>

  <rect x="594" y="230" width="412" height="48" rx="24" fill="#2B0D09" stroke="#7F1D1D"/>
  <circle cx="626" cy="254" r="8" fill="#FFE06E"/>
  <text x="650" y="262" fill="#FFE06E" font-family="Inter, Arial, sans-serif" font-size="30">Powered by Claude Sonnet + Vision</text>
