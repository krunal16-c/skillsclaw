version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillsclaw
      POSTGRES_USER: skillsclaw
      POSTGRES_PASSWORD: skillsclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillsclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI → open http://localhost:9001
    environment:
      MINIO_ROOT_USER: skillsclaw
      MINIO_ROOT_PASSWORD: skillsclaw
    command: server /data --console-address :9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the bucket on first run
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 skillsclaw skillsclaw &&
      mc mb --ignore-existing local/skillsclaw-videos &&
      mc anonymous set download local/skillsclaw-videos
      "

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URLs from .env — inside Docker, use service names
      DATABASE_URL: postgresql+asyncpg://skillsclaw:skillsclaw@postgres:5432/skillsclaw
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env
    environment:
      # Override localhost URLs from .env — inside Docker, use service names
      DATABASE_URL: postgresql+asyncpg://skillsclaw:skillsclaw@postgres:5432/skillsclaw
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.pipeline.worker:celery_app worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
  minio_data:
